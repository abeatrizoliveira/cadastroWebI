<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico">
    <link rel="stylesheet" href="/assets/css/main.css">
    <title>DSM | Cadastro</title>
</head>
<body>
    <main class="card">
        <h1 class="title">Cadastro de Usuários</h1>
        <input type="text" class="user-input" id="user-name" placeholder="Digite o nome do usuário ">
        <input type="email" class="user-input" id="user-email" placeholder="Digite o nome do usuário ">
        <div class="actions">
            <button class="action-button action-button-primary">Salvar</button>
            <button class="action-button action-button-secondary">Limpar</button>
        </div>
        <section class="user-list">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">

                </tbody>
            </table>
        </section>
    </main>
    <script src="/assets/js/main.js"></script>
</body>
</html>
